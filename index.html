<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beschikbaarheid Karel – Bijles</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f7f8fa;
    color: #1a1a2e;
    min-height: 100vh;
  }

  header {
    background: #1a1a2e;
    color: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  header p {
    font-size: 0.8rem;
    opacity: 0.6;
    margin-top: 2px;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.78rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  .dot-bezet { background: #b0b8c9; }
  .dot-vrij { background: #e8f5e9; border: 1px solid #c8e6c9; }

  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 16px;
    background: white;
    border-bottom: 1px solid #e8eaf0;
  }

  .nav-bar button {
    background: none;
    border: 1px solid #d0d5e0;
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 0.85rem;
    color: #1a1a2e;
    transition: background 0.15s;
  }

  .nav-bar button:hover { background: #f0f2f7; }

  .nav-bar .week-label {
    font-size: 0.95rem;
    font-weight: 600;
    min-width: 200px;
    text-align: center;
  }

  .calendar-wrapper {
    overflow-x: auto;
    padding: 16px;
  }

  .calendar {
    display: grid;
    grid-template-columns: 52px repeat(7, 1fr);
    min-width: 600px;
    background: white;
    border-radius: 12px;
    border: 1px solid #e8eaf0;
    overflow: hidden;
  }

  .col-header {
    text-align: center;
    padding: 10px 4px;
    font-size: 0.75rem;
    font-weight: 600;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 2px solid #e8eaf0;
    background: #fafbfc;
  }

  .col-header.today {
    color: #1a1a2e;
  }

  .col-header .day-num {
    display: block;
    font-size: 1.2rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-top: 2px;
  }

  .col-header.today .day-num {
    background: #1a1a2e;
    color: white;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    line-height: 32px;
    margin: 4px auto 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .time-label {
    font-size: 0.7rem;
    color: #9ca3af;
    text-align: right;
    padding-right: 8px;
    line-height: 1;
    position: relative;
    top: -6px;
  }

  .time-row {
    display: contents;
  }

  .cell {
    border-left: 1px solid #f0f2f7;
    border-bottom: 1px solid #f0f2f7;
    height: 28px;
    position: relative;
    background: white;
    transition: background 0.1s;
  }

  .cell.bezet {
    background: #dde2ec;
  }

  .cell.half-bezet-top {
    background: linear-gradient(to bottom, #dde2ec 50%, white 50%);
  }

  .cell.half-bezet-bottom {
    background: linear-gradient(to bottom, white 50%, #dde2ec 50%);
  }

  .time-cell {
    border-bottom: 1px solid #f0f2f7;
    height: 28px;
    background: #fafbfc;
    border-right: 1px solid #e8eaf0;
  }

  .hour-line .cell,
  .hour-line .time-cell {
    border-bottom: 1px solid #e8eaf0;
  }

  #status {
    text-align: center;
    padding: 40px;
    color: #6b7280;
    font-size: 0.9rem;
  }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid #e0e0e0;
    border-top-color: #1a1a2e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .info-bar {
    text-align: center;
    padding: 12px;
    font-size: 0.78rem;
    color: #9ca3af;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Beschikbaarheid Karel</h1>
    <p>Bijles – klik een vrij moment aan om voor te stellen</p>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="dot dot-bezet"></div> Bezet</div>
    <div class="legend-item"><div class="dot dot-vrij"></div> Vrij</div>
  </div>
</header>

<div class="nav-bar">
  <button onclick="changeWeek(-1)">&#8592; Vorige</button>
  <div class="week-label" id="weekLabel"></div>
  <button onclick="changeWeek(1)">Volgende &#8594;</button>
</div>

<div class="calendar-wrapper">
  <div id="status"><span class="spinner"></span> Agenda laden…</div>
  <div class="calendar" id="calendar" style="display:none"></div>
</div>

<div class="info-bar">Wil je een moment voorstellen? Stuur een berichtje met datum en uur.</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz8YkQn_r-dn3Md9oV9Rr8cFaV1nl1ygPtPURF-0Ho-6NnQeg-yEDi722jnWJbSsqA9Ew/exec';

const DAYS_NL = ['Ma','Di','Wo','Do','Vr','Za','Zo'];
const MONTHS_NL = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];

// Start uur en eind uur van de dag
const START_HOUR = 8;
const END_HOUR = 23;

let currentMonday = getMonday(new Date());
let allEvents = [];

function getMonday(d) {
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const m = new Date(d);
  m.setDate(d.getDate() + diff);
  m.setHours(0,0,0,0);
  return m;
}

function changeWeek(dir) {
  currentMonday = new Date(currentMonday);
  currentMonday.setDate(currentMonday.getDate() + dir * 7);
  renderCalendar();
}

function updateWeekLabel() {
  const sunday = new Date(currentMonday);
  sunday.setDate(currentMonday.getDate() + 6);
  const label = `${currentMonday.getDate()} – ${sunday.getDate()} ${MONTHS_NL[sunday.getMonth()]} ${sunday.getFullYear()}`;
  document.getElementById('weekLabel').textContent = label;
}

async function loadIcal() {
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    if (!res.ok) throw new Error();
    const text = await res.text();
    if (!text.includes('BEGIN:VCALENDAR')) throw new Error();
    allEvents = parseIcal(text);
    document.getElementById('status').style.display = 'none';
    document.getElementById('calendar').style.display = 'grid';
    renderCalendar();
  } catch(e) {
    document.getElementById('status').innerHTML = '⚠️ Agenda kon niet geladen worden. Probeer de pagina te herladen.';
  }
}

function parseIcal(text) {
  const events = [];
  const lines = text.replace(/\r\n /g, '').replace(/\r\n\t/g, '').split(/\r\n|\n/);
  let inEvent = false, current = {};

  for (const line of lines) {
    if (line === 'BEGIN:VEVENT') { inEvent = true; current = {}; }
    else if (line === 'END:VEVENT') {
      if (current.start && current.end) events.push(current);
      inEvent = false;
    } else if (inEvent) {
      if (line.startsWith('DTSTART')) current.start = parseDate(line.split(':')[1]);
      else if (line.startsWith('DTEND')) current.end = parseDate(line.split(':')[1]);
    }
  }
  return events;
}

function parseDate(str) {
  if (!str) return null;
  str = str.trim();
  if (str.length === 8) {
    // All-day: YYYYMMDD
    return new Date(+str.slice(0,4), +str.slice(4,6)-1, +str.slice(6,8), 0, 0, 0);
  }
  // YYYYMMDDTHHMMSSZ
  const y = +str.slice(0,4), mo = +str.slice(4,6)-1, d = +str.slice(6,8);
  const h = +str.slice(9,11), m = +str.slice(11,13), s = +str.slice(13,15);
  if (str.endsWith('Z')) return new Date(Date.UTC(y,mo,d,h,m,s));
  return new Date(y,mo,d,h,m,s);
}

function renderCalendar() {
  updateWeekLabel();
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  const today = new Date();
  today.setHours(0,0,0,0);

  // Header row
  const emptyHeader = document.createElement('div');
  emptyHeader.className = 'col-header';
  cal.appendChild(emptyHeader);

  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(currentMonday);
    d.setDate(currentMonday.getDate() + i);
    weekDays.push(d);

    const h = document.createElement('div');
    h.className = 'col-header' + (d.getTime() === today.getTime() ? ' today' : '');
    h.innerHTML = `${DAYS_NL[i]}<span class="day-num">${d.getDate()}</span>`;
    cal.appendChild(h);
  }

  // Build bezet map: for each day-column, which 30-min slots are bezet?
  // Slots: START_HOUR*2 .. END_HOUR*2-1 (each = 30 min)
  const totalSlots = (END_HOUR - START_HOUR) * 2;
  const bezet = Array.from({length: 7}, () => new Array(totalSlots).fill(false));

  for (const ev of allEvents) {
    if (!ev.start || !ev.end) continue;
    for (let di = 0; di < 7; di++) {
      const dayStart = new Date(weekDays[di]);
      dayStart.setHours(0,0,0,0);
      const dayEnd = new Date(dayStart);
      dayEnd.setDate(dayStart.getDate() + 1);

      const evStart = ev.start < dayStart ? dayStart : ev.start;
      const evEnd = ev.end > dayEnd ? dayEnd : ev.end;
      if (evStart >= evEnd) continue;

      const slotStart = Math.floor((evStart.getHours() * 60 + evStart.getMinutes() - START_HOUR * 60) / 30);
      const slotEnd = Math.ceil((evEnd.getHours() * 60 + evEnd.getMinutes() - START_HOUR * 60) / 30);

      for (let s = Math.max(0, slotStart); s < Math.min(totalSlots, slotEnd); s++) {
        bezet[di][s] = true;
      }
    }
  }

  // Time rows (each row = 30 min)
  for (let slot = 0; slot < totalSlots; slot++) {
    const hour = START_HOUR + Math.floor(slot / 2);
    const isHour = slot % 2 === 0;

    const timeCell = document.createElement('div');
    timeCell.className = 'time-cell' + (isHour ? ' hour-line' : '');
    if (isHour) {
      timeCell.innerHTML = `<div class="time-label">${hour}:00</div>`;
    }
    cal.appendChild(timeCell);

    for (let di = 0; di < 7; di++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (isHour ? ' hour-line' : '') + (bezet[di][slot] ? ' bezet' : '');
      cal.appendChild(cell);
    }
  }
}

loadIcal();
</script>
</body>
</html>
